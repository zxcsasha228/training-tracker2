<!DOCTYPE html>
<html>
<head>
    <title>Редактировать упражнение</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .main-content {
            margin-left: 280px;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .main-content.expanded {
            margin-left: 80px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, var(--warning), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-gray {
            background: var(--gray);
            color: white;
        }

        .btn-gray:hover {
            filter: brightness(1.1);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #fbbf24);
            color: var(--dark);
        }

        .btn-warning:hover {
            filter: brightness(1.1);
        }

        /* Красивый дизайн для загрузки файла */
        .file-upload {
            border: 2px dashed #e5e7eb;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
            background: var(--light);
        }

        .file-upload:hover {
            border-color: var(--warning);
            background: rgba(245, 158, 11, 0.05);
        }

        .file-upload i {
            font-size: 3em;
            color: var(--gray);
            margin-bottom: 10px;
        }

        .file-upload p {
            color: var(--gray);
            font-size: 1em;
            margin-bottom: 5px;
        }

        .file-upload .hint {
            font-size: 0.85em;
            color: var(--gray);
            opacity: 0.7;
        }

        .file-name {
            margin-top: 10px;
            padding: 8px;
            background: white;
            border-radius: 8px;
            color: var(--warning);
            font-weight: 500;
            display: none;
        }

        .file-name.active {
            display: block;
        }

        .image-preview {
            max-width: 200px;
            max-height: 200px;
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid var(--warning);
            display: none;
        }

        .image-preview.active {
            display: block;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .current-image {
            margin-bottom: 20px;
            text-align: center;
        }

        .current-image img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 10px;
            border: 3px solid var(--warning);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
        }

        label i {
            color: var(--warning);
            margin-right: 8px;
        }

        input, select {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 1.1em;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--warning);
        }

        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 15px 18px;
            border-radius: 16px;
            margin-bottom: 25px;
            border-left: 5px solid var(--danger);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group .btn {
            flex: 1;
            justify-content: center;
            padding: 12px;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 60px 20px 20px;
            }
            
            .container {
                padding: 30px 20px;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <input type="hidden" id="userId" value="{{ session['user_id'] }}">
    {% include 'sidebar.html' %}
    
    <div class="main-content" id="mainContent">
        <div class="container">
            <div class="header">
                <h1><i class="fas fa-edit"></i> Редактировать упражнение</h1>
                <a href="{{ url_for('exercises_library') }}" class="btn btn-gray">
                    <i class="fas fa-times"></i> Отмена
                </a>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                <!-- Текущее изображение -->
                {% if exercise.image %}
                <div class="current-image">
                    <img src="{{ url_for('static', filename=exercise.image) }}" alt="{{ exercise.name }}">
                </div>
                {% endif %}

                <!-- Красивая загрузка нового изображения -->
                <div class="file-upload" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Нажмите чтобы загрузить новое изображение</p>
                    <p class="hint">Оставьте пустым, чтобы сохранить текущее</p>
                    <div class="file-name" id="fileName"></div>
                </div>
                
                <input type="file" id="imageInput" name="image" accept="image/*" style="display: none;" onchange="previewImage(this)">
                
                <div class="image-preview" id="imagePreview">
                    <img src="" alt="Превью">
                </div>

                <!-- Название упражнения -->
                <div class="form-group">
                    <label><i class="fas fa-dumbbell"></i> Название упражнения *</label>
                    <input type="text" name="name" value="{{ exercise.name }}" required>
                </div>

                <!-- Группа мышц -->
                <div class="form-group">
                    <label><i class="fas fa-bolt"></i> Группа мышц *</label>
                    <select name="muscle_group" required>
                        <option value="Грудные" {% if exercise.muscle_group == 'Грудные' %}selected{% endif %}>Грудные</option>
                        <option value="Спина" {% if exercise.muscle_group == 'Спина' %}selected{% endif %}>Спина</option>
                        <option value="Ноги" {% if exercise.muscle_group == 'Ноги' %}selected{% endif %}>Ноги</option>
                        <option value="Плечи" {% if exercise.muscle_group == 'Плечи' %}selected{% endif %}>Плечи</option>
                        <option value="Бицепс" {% if exercise.muscle_group == 'Бицепс' %}selected{% endif %}>Бицепс</option>
                        <option value="Трицепс" {% if exercise.muscle_group == 'Трицепс' %}selected{% endif %}>Трицепс</option>
                        <option value="Пресс" {% if exercise.muscle_group == 'Пресс' %}selected{% endif %}>Пресс</option>
                        <option value="Ягодицы" {% if exercise.muscle_group == 'Ягодицы' %}selected{% endif %}>Ягодицы</option>
                    </select>
                </div>

                <div class="button-group">
                    <a href="{{ url_for('exercises_library') }}" class="btn btn-gray">
                        Отмена
                    </a>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                </div>
            </form>
        </div>
    </div>

    {% include 'active_workout_banner.html' %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mainContent = document.getElementById('mainContent');
            const savedState = localStorage.getItem('sidebar_collapsed');
            
            if (savedState === 'true') {
                mainContent.classList.add('expanded');
            }
        });

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const fileName = document.getElementById('fileName');
            const previewImg = preview.querySelector('img');
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                fileName.textContent = file.name;
                fileName.classList.add('active');
                
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    preview.classList.add('active');
                }
                
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
