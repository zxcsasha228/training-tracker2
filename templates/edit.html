<!DOCTYPE html>
<html>
<head>
    <title>Редактировать тренировку</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
        .container { background-color: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h1 { color: #333; }
        form { margin: 20px 0; }
        input, button { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; border-radius: 3px; border: 1px solid #ddd; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .cancel { background-color: #6c757d; }
        .cancel:hover { background-color: #545b62; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Редактировать тренировку</h1>
        
        <form action="/update/{{ workout.id }}" method="post">
            <label>Дата:</label>
            <input type="date" name="date" value="{{ workout.date }}" required>
            
            <label>Упражнение:</label>
            <input type="text" name="exercise" value="{{ workout.exercise }}" required>
            
            <label>Подходы:</label>
            <input type="number" name="sets" value="{{ workout.sets }}" required>
            
            <label>Повторения:</label>
            <input type="number" name="reps" value="{{ workout.reps }}" required>
            
            <label>Вес (кг):</label>
            <input type="number" step="0.1" name="weight" value="{{ workout.weight }}" required>
            
            <button type="submit">💾 Сохранить изменения</button>
            <a href="/" style="text-decoration: none;"><button type="button" class="cancel">❌ Отмена</button></a>
        </form>
    </div>
</body>
</html>
