<!DOCTYPE html>
<html>
<head>
    <title>Редактировать тренировку</title>
    <meta charset="utf-8">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, var(--warning), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-gray {
            background: var(--gray);
            color: white;
        }

        .btn-gray:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #fbbf24);
            color: var(--dark);
            width: 100%;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
            font-size: 1em;
        }

        label i {
            color: var(--warning);
            margin-right: 8px;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 1.1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--warning);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group .btn {
            flex: 1;
            margin-top: 0;
        }

        .workout-info {
            background: var(--light);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 0.95em;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .workout-info i {
            color: var(--warning);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-edit"></i> Редактировать</h1>
            <a href="{{ url_for('view_workout', workout_id=workout.id) }}" class="btn btn-gray">
                <i class="fas fa-times"></i>
            </a>
        </div>

        <!-- Информация о дате (только для информации) -->
        <div class="workout-info">
            <i class="fas fa-calendar"></i>
            <span>Тренировка от {{ workout.date }}</span>
        </div>

        <form method="post">
            <div class="form-group">
                <label><i class="fas fa-dumbbell"></i> Название тренировки</label>
                <input type="text" name="name" value="{{ workout.name }}" required 
                       placeholder="Например: Тренировка груди"
                       autofocus>
            </div>

            <div class="button-group">
                <a href="{{ url_for('view_workout', workout_id=workout.id) }}" class="btn btn-gray">
                    Отмена
                </a>
                <button type="submit" class="btn btn-warning">
                    <i class="fas fa-save"></i> Сохранить
                </button>
            </div>
        </form>
    </div>
</body>
</html>
