<!DOCTYPE html>
<html>
<head>
    <title>Трекер Тренировок</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
        .container { background-color: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        form { margin-bottom: 30px; padding: 20px; background-color: #f9f9f9; border-radius: 5px; }
        input, button { padding: 8px; margin: 5px; border-radius: 3px; border: 1px solid #ddd; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ Трекер тренировок</h1>
        
        <form action="/add" method="post">
            <h3>Добавить тренировку</h3>
            <input type="date" name="date" required>
            <input type="text" name="exercise" placeholder="Упражнение" required>
            <input type="number" name="sets" placeholder="Подходы" required>
            <input type="number" name="reps" placeholder="Повторения" required>
            <input type="number" step="0.1" name="weight" placeholder="Вес (кг)" required>
            <button type="submit">➕ Добавить</button>
        </form>

        <h2>История тренировок</h2>
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Упражнение</th>
                    <th>Подходы</th>
                    <th>Повторения</th>
                    <th>Вес (кг)</th>
                </tr>
            </thead>
            <tbody>
                {% for workout in workouts %}
                <tr>
                    <td>{{ workout.date }}</td>
                    <td>{{ workout.exercise }}</td>
                    <td>{{ workout.sets }}</td>
                    <td>{{ workout.reps }}</td>
                    <td>{{ workout.weight }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
