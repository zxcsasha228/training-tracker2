<h2>История тренировок</h2>
<table>
    <thead>
        <tr>
            <th>Дата</th>
            <th>Упражнение</th>
            <th>Подходы</th>
            <th>Повторения</th>
            <th>Вес (кг)</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for workout in workouts %}
        <tr>
            <td>{{ workout.date }}</td>
            <td>{{ workout.exercise }}</td>
            <td>{{ workout.sets }}</td>
            <td>{{ workout.reps }}</td>
            <td>{{ workout.weight }}</td>
            <td>
                <a href="/edit/{{ workout.id }}" style="text-decoration: none;">
                    <button style="background-color: #ffc107; color: black; padding: 5px 10px; margin: 2px;">✏️</button>
                </a>
                <form action="/delete/{{ workout.id }}" method="post" style="display: inline;" onsubmit="return confirm('Точно удалить?')">
                    <button type="submit" style="background-color: #dc3545; color: white; padding: 5px 10px; margin: 2px;">🗑️</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
