<!-- Активная тренировка - плашка внизу -->
<div class="active-workout-banner" id="activeWorkoutBanner" style="display: none;">
    <div class="banner-content">
        <div class="banner-left">
            <div class="banner-icon">
                <i class="fas fa-play-circle"></i>
            </div>
            <div class="banner-info">
                <div class="banner-title" id="activeWorkoutName">Тренировка</div>
                <div class="banner-timer" id="activeWorkoutTimer">00:00</div>
            </div>
        </div>
        <div class="banner-right">
            <a href="#" id="continueWorkoutBtn" class="banner-btn">
                <i class="fas fa-arrow-right"></i> Продолжить
            </a>
        </div>
    </div>
</div>

<style>
    .active-workout-banner {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        z-index: 9999;
        display: none;
        pointer-events: none;
    }

    .banner-content {
        max-width: 800px;
        margin: 0 auto;
        background: linear-gradient(135deg, #10b981, #059669);
        border-radius: 60px;
        padding: 12px 20px;
        box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        pointer-events: none;
    }

    .banner-left {
        display: flex;
        align-items: center;
        gap: 15px;
        pointer-events: none;
    }

    .banner-icon {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2em;
        pointer-events: none;
    }

    .banner-info {
        display: flex;
        flex-direction: column;
        pointer-events: none;
    }

    .banner-title {
        font-weight: 600;
        font-size: 1em;
        opacity: 0.9;
        pointer-events: none;
    }

    .banner-timer {
        font-size: 1.3em;
        font-weight: bold;
        font-family: monospace;
        letter-spacing: 2px;
        pointer-events: none;
    }

    .banner-right {
        display: flex;
        align-items: center;
        pointer-events: auto;
    }

    .banner-btn {
        background: white;
        color: #10b981;
        border: none;
        padding: 10px 25px;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        pointer-events: auto;
    }

    .banner-btn:hover {
        filter: brightness(1.1);
    }

    .banner-btn i {
        font-size: 0.9em;
    }

    @media (max-width: 768px) {
        .banner-content {
            padding: 12px 15px;
        }
        
        .banner-title {
            font-size: 0.9em;
        }
        
        .banner-timer {
            font-size: 1.1em;
        }
        
        .banner-btn {
            padding: 8px 15px;
            font-size: 0.9em;
        }
    }
</style>

<script>
    // Функция для проверки существования тренировки на сервере
    async function checkWorkoutExists(workoutId) {
        try {
            const response = await fetch(`/api/check_workout/${workoutId}`);
            const data = await response.json();
            return data.exists;
        } catch (error) {
            console.error('Ошибка при проверке тренировки:', error);
            return false;
        }
    }

    // Функция для очистки данных удалённой тренировки
    async function cleanupDeletedWorkouts() {
        const userIdElement = document.getElementById('userId');
        const currentUserId = userIdElement ? userIdElement.value : null;
        
        if (!currentUserId) return;
        
        const keysToRemove = [];
        
        // Собираем все ключи с активными тренировками
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            
            if (key && key.startsWith(`workout_${currentUserId}_`) && key.endsWith('_active')) {
                const workoutId = key.replace(`workout_${currentUserId}_`, '').replace('_active', '');
                const exists = await checkWorkoutExists(workoutId);
                
                if (!exists) {
                    console.log(`Тренировка ${workoutId} удалена, очищаем данные`);
                    keysToRemove.push(`workout_${currentUserId}_${workoutId}_active`);
                    keysToRemove.push(`workout_${currentUserId}_${workoutId}`);
                    keysToRemove.push(`workout_${currentUserId}_${workoutId}_timer`);
                }
            }
        }
        
        // Удаляем все ключи
        keysToRemove.forEach(key => localStorage.removeItem(key));
    }

    // Функция для обновления плашки с активной тренировкой
    async function updateActiveWorkoutBanner() {
        const banner = document.getElementById('activeWorkoutBanner');
        if (!banner) return;
        
        const workoutName = document.getElementById('activeWorkoutName');
        const workoutTimer = document.getElementById('activeWorkoutTimer');
        const continueBtn = document.getElementById('continueWorkoutBtn');
        
        // Получаем текущего пользователя из HTML (если есть)
        const userIdElement = document.getElementById('userId');
        const currentUserId = userIdElement ? userIdElement.value : null;
        
        console.log('Проверка баннера:', { currentUserId });
        
        if (!currentUserId) {
            console.log('Нет ID пользователя');
            banner.style.display = 'none';
            return;
        }
        
        // Сначала чистим данные удалённых тренировок
        await cleanupDeletedWorkouts();
        
        // Ищем активную тренировку для текущего пользователя
        let activeWorkoutId = null;
        let activeWorkoutData = null;
        
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            
            if (key && key.startsWith(`workout_${currentUserId}_`) && key.endsWith('_active')) {
                const isActive = localStorage.getItem(key) === 'true';
                console.log('Найден ключ:', key, 'isActive:', isActive);
                
                if (isActive) {
                    activeWorkoutId = key.replace(`workout_${currentUserId}_`, '').replace('_active', '');
                    
                    const workoutData = localStorage.getItem(`workout_${currentUserId}_${activeWorkoutId}`);
                    console.log('Данные тренировки:', workoutData);
                    
                    if (workoutData) {
                        try {
                            activeWorkoutData = JSON.parse(workoutData);
                        } catch (e) {
                            console.error('Ошибка парсинга данных:', e);
                        }
                    } else {
                        // Если данных нет, удаляем флаг активности
                        localStorage.removeItem(`workout_${currentUserId}_${activeWorkoutId}_active`);
                    }
                    break;
                }
            }
        }
        
        if (activeWorkoutId && activeWorkoutData) {
            console.log('Показываем баннер для тренировки:', activeWorkoutId);
            const timerData = localStorage.getItem(`workout_${currentUserId}_${activeWorkoutId}_timer`);
            
            workoutName.textContent = activeWorkoutData.name || 'Активная тренировка';
            
            if (timerData) {
                const seconds = parseInt(timerData);
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                workoutTimer.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            } else {
                workoutTimer.textContent = '00:00';
            }
            
            continueBtn.href = `/workout/${activeWorkoutId}/continue`;
            banner.style.display = 'block';
        } else {
            console.log('Нет активной тренировки, скрываем баннер');
            banner.style.display = 'none';
        }
    }

    // Обновляем баннер при загрузке страницы
    document.addEventListener('DOMContentLoaded', updateActiveWorkoutBanner);
    
    // Обновляем баннер каждые 3 секунды
    setInterval(updateActiveWorkoutBanner, 3000);
    
    // Также обновляем при возврате на страницу
    window.addEventListener('pageshow', updateActiveWorkoutBanner);
</script>
