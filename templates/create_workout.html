<!DOCTYPE html>
<html>
<head>
    <title>Новая тренировка</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .main-content {
            margin-left: 280px;
            padding: 40px 20px;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }

        .main-content.expanded {
            margin-left: 80px;
        }

        .content-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, var(--success), #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        /* Кнопки */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-gray {
            background: var(--gray);
            color: white;
        }

        .btn-gray:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            width: 100%;
            justify-content: center;
            margin-top: 20px;
            padding: 15px;
            font-size: 1.1em;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        /* Форма */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
            font-size: 1em;
        }

        label i {
            color: var(--success);
            margin-right: 8px;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 1.1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        input::placeholder {
            color: #aaa;
            font-size: 0.95em;
        }

        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 15px 18px;
            border-radius: 16px;
            margin-bottom: 25px;
            border-left: 5px solid var(--danger);
            font-weight: 500;
        }

        .hint {
            text-align: center;
            font-size: 0.9em;
            color: var(--gray);
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(0,0,0,0.05);
        }

        .hint i {
            color: var(--success);
        }

        /* Адаптация */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 60px 20px 20px;
            }
            
            .content-container {
                padding: 30px 20px;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .header-buttons {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <input type="hidden" id="userId" value="{{ session['user_id'] }}">
    {% include 'sidebar.html' %}
    
    <div class="main-content" id="mainContent">
        <div class="content-container">
            <div class="header">
                <h1><i class="fas fa-plus-circle"></i> Новая тренировка</h1>
                <div class="header-buttons">
                    
                    <a href="{{ url_for('my_workouts') }}" class="btn btn-gray">
                        <i class="fas fa-times"></i> Отмена
                    </a>
                </div>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post">
                <div class="form-group">
                    <label><i class="fas fa-dumbbell"></i> Название тренировки</label>
                    <input type="text" name="name" required 
                           placeholder="Например: Тренировка груди"
                           autofocus>
                </div>

                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check"></i> Создать тренировку
                </button>
            </form>

            <div class="hint">
                <i class="fas fa-info-circle"></i> После создания можно будет добавить упражнения
            </div>
        </div>
    </div>

    {% include 'active_workout_banner.html' %}

    <script>
        // Синхронизация состояния сайдбара
        document.addEventListener('DOMContentLoaded', function() {
            const mainContent = document.getElementById('mainContent');
            const savedState = localStorage.getItem('sidebar_collapsed');
            
            if (savedState === 'true') {
                mainContent.classList.add('expanded');
            }
        });
    </script>
</body>
</html>
