<!DOCTYPE html>
<html>
<head>
    <title>Управление таблицами</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .main-content {
            margin-left: 280px;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .main-content.expanded {
            margin-left: 80px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: var(--dark);
        }

        .btn-gray {
            background: var(--gray);
            color: white;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        /* Вкладки */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .tab-btn:not(.active) {
            background: white;
            color: var(--gray);
            border: 2px solid #e5e7eb;
        }

        .tab-btn:not(.active):hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Панель управления */
        .control-panel {
            background: #f9fafb;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            border: 2px solid #e5e7eb;
        }

        .table-selector {
            flex: 2;
            min-width: 250px;
        }

        .table-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1em;
            background: white;
        }

        .action-group {
            flex: 3;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-box {
            flex: 2;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1em;
        }

        /* Статистика таблицы */
        .table-stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        .stat-item .label {
            color: var(--gray);
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-item .value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--primary);
        }

        /* Таблица */
        .table-wrapper {
            background: white;
            border-radius: 16px;
            overflow: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            max-height: 500px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        .data-table th {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e5e7eb;
            color: var(--dark);
        }

        .data-table tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .data-table tr.selected {
            background: rgba(99, 102, 241, 0.1);
        }

        /* Чекбоксы */
        .checkbox-cell {
            width: 40px;
            text-align: center;
        }

        .row-checkbox, .select-all {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Ячейки с данными */
        .editable-cell {
            cursor: pointer;
            position: relative;
        }

        .editable-cell:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .editable-cell.editing {
            padding: 0;
        }

        .editable-cell input, .editable-cell select {
            width: 100%;
            height: 100%;
            padding: 12px 15px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            font-size: 1em;
            background: white;
        }

        /* Панель массовых действий */
        .bulk-actions {
            background: #f9fafb;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .bulk-actions select {
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            min-width: 200px;
        }

        .selection-info {
            color: var(--gray);
            font-size: 0.95em;
        }

        .selection-info span {
            font-weight: bold;
            color: var(--primary);
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .page-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;

            top: 0;
            left: 0;
            width: 100%;

            color: var(--dark);
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1em;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 60px 20px 20px;
            }
            
            .control-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .tabs-container {
                flex-direction: column;
            }
        }
    </style>

    <script>
    let currentTable = 'users';
    let currentPage = 1;
    let pageSize = 10;
    let totalPages = 1;
    let allData = [];
    let filteredData = [];
    let selectedRows = new Set();
    let editingCell = null;
    let currentWorkoutId = null;

    // Переменные для справочников
    let currentLookupTable = 'gender_types';
    let lookupAllData = [];
    let lookupFilteredData = [];
    let lookupSelectedRows = new Set();
    let lookupCurrentPage = 1;
    let lookupPageSize = 10;
    let lookupTotalPages = 1;
    let lookupLoaded = false;

    // Состояние сайдбара
    document.addEventListener('DOMContentLoaded', function() {
        const mainContent = document.getElementById('mainContent');
        const savedState = localStorage.getItem('sidebar_collapsed');
        if (savedState === 'true') {
            mainContent.classList.add('expanded');
        }
        changeTable();
    });

    // ========== ОСНОВНЫЕ ТАБЛИЦЫ ==========

    // Смена таблицы
    function changeTable() {
        currentTable = document.getElementById('tableSelect').value;
        currentPage = 1;
        selectedRows.clear();
        loadTableData();
    }

    // Загрузка данных из базы
    function loadTableData() {
        fetch(`/api/table_data/${currentTable}`)
            .then(response => response.json())
            .then(data => {
                allData = data;
                filterData();
                renderTable();
                updateStats();
            })
            .catch(error => console.error('Ошибка загрузки:', error));
    }

    // Фильтрация данных
    function filterData() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        if (!searchTerm) {
            filteredData = allData;
        } else {
            filteredData = allData.filter(row => {
                return Object.values(row).some(value => 
                    String(value).toLowerCase().includes(searchTerm)
                );
            });
        }
        
        totalPages = Math.ceil(filteredData.length / pageSize);
        renderPagination();
    }

    // Поиск
    function searchTable() {
        filterData();
        renderTable();
    }

    // Отрисовка таблицы
    function renderTable() {
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageData = filteredData.slice(start, end);
        
        renderHeader();
        renderBody(pageData);
        updateStats();
    }

    // Отрисовка заголовков
    function renderHeader() {
        const header = document.getElementById('tableHeader');
        const currentTable = document.getElementById('tableSelect').value;
        
        if (allData.length === 0) {
            header.innerHTML = '<tr><th>Нет данных</th></tr>';
            return;
        }
        
        const columns = Object.keys(allData[0]);
        let displayColumns = [...columns];
        let columnNames = {};
        
        // Русские названия для разных таблиц
        if (currentTable === 'workout_sessions') {
            displayColumns = [
                'id',
                'user_id',
                'full_name',
                'name',
                'date',
                'notes',
                'created_at'
            ];
            columnNames = {
                'id': 'ID',
                'user_id': 'ID пользователя',
                'full_name': 'ФИО пользователя',
                'name': 'Название тренировки',
                'date': 'Дата',
                'notes': 'Заметки',
                'created_at': 'Дата создания'
            };
        }
        else if (currentTable === 'exercises') {
            displayColumns = [
                'id',
                'name',
                'muscle_group',
                'image',
                'created_by',
                'created_at'
            ];
            columnNames = {
                'id': 'ID',
                'name': 'Название упражнения',
                'muscle_group': 'Группа мышц',
                'image': 'Изображение',
                'created_by': 'Создал',
                'created_at': 'Дата создания'
            };
        }
        else if (currentTable === 'weight_tracking') {
            displayColumns = [

    // Сохранение редактирования
    function saveEdit(newValue) {
        if (!editingCell) return;
        
        const { column, rowId, originalValue } = editingCell;
        
        if (newValue !== originalValue) {
            fetch(`/api/update_cell/${currentTable}/${rowId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    column: column,
                    value: newValue
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    editingCell.cell.innerHTML = newValue;
                    loadTableData();
                } else {
                    alert('Ошибка сохранения');
                    editingCell.cell.innerHTML = originalValue;
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                editingCell.cell.innerHTML = originalValue;
            });
        } else {
            editingCell.cell.innerHTML = originalValue;
        }
        
        editingCell.cell.classList.remove('editing');
        editingCell = null;
    }

    // Отмена редактирования
    function cancelEdit() {
        if (editingCell) {
            editingCell.cell.innerHTML = editingCell.originalValue;
            editingCell.cell.classList.remove('editing');
            editingCell = null;
        }
    }

    // Сортировка
    let sortColumn = null;
    let sortDirection = 'asc';

    function sortBy(column) {
        if (sortColumn === column) {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
            sortColumn = column;
            sortDirection = 'asc';
        }
        
        filteredData.sort((a, b) => {
            let aVal = a[column];
            let bVal = b[column];
            
            if (typeof aVal === 'number') {
                return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
            } else {
                aVal = String(aVal).toLowerCase();
                bVal = String(bVal).toLowerCase();
                return sortDirection === 'asc' ? 
                    aVal.localeCompare(bVal) : 
                    bVal.localeCompare(aVal);
            }
        });
        
        renderTable();
    }

    // Выделение строк
    function toggleRow(checkbox) {
        const rowId = checkbox.value;
        
        if (checkbox.checked) {
            selectedRows.add(rowId);
        } else {
            selectedRows.delete(rowId);
        }
        
        updateSelection();
    }

    function toggleAll() {
        const checkAll = document.querySelector('.select-all').checked;
        const checkboxes = document.querySelectorAll('.row-checkbox');
        
        checkboxes.forEach(cb => {
            cb.checked = checkAll;
            const rowId = cb.value;
            
            if (checkAll) {
                selectedRows.add(rowId);
            } else {
                selectedRows.delete(rowId);
            }
        });
        
        updateSelection();
    }

    function updateSelection() {
        document.querySelectorAll('tr').forEach(tr => {
            const checkbox = tr.querySelector('.row-checkbox');
            if (checkbox) {
                const rowId = checkbox.value;
                if (selectedRows.has(rowId)) {
                    tr.classList.add('selected');
                } else {
                    tr.classList.remove('selected');
                }
            }
        });
        
        const selectedCount = selectedRows.size;
        document.getElementById('selectedRecords').textContent = selectedCount;
        
        const bulkDiv = document.getElementById('bulkActions');
        if (selectedCount > 0) {
            bulkDiv.style.display = 'flex';
            document.getElementById('selectedCount').textContent = selectedCount;
        } else {
            bulkDiv.style.display = 'none';
        }
    }

    function clearSelection() {
        selectedRows.clear();
        document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = false);
        document.querySelector('.select-all').checked = false;
        updateSelection();
    }

    // Массовые действия
    function executeBulkAction() {
        const action = document.getElementById('bulkAction').value;
        
        if (selectedRows.size === 0) {
            alert('Выберите записи');
            return;
        }
        
        const ids = Array.from(selectedRows);
        
        if (action === 'delete') {
            if (confirm(`Удалить ${ids.length} записей?`)) {
                fetch(`/api/bulk_delete/${currentTable}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ids: ids })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        selectedRows.clear();
                        loadTableData();
                    } else {
                        alert('Ошибка удаления');
                    }
                });
            }
        } else if (action === 'export') {
            const selectedData = allData.filter(row => ids.includes(String(row.id)));
            const blob = new Blob([JSON.stringify(selectedData, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentTable}_export.json`;
            a.click();
        }
    }

    // Удаление одной записи
    function deleteRow(id) {
        if (confirm('Удалить запись?')) {
            fetch(`/api/delete_row/${currentTable}/${id}`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadTableData();
                } else {
                    alert('Ошибка удаления');
                }
            });
        }
    }

    function editRow(id) {
        const rowData = allData.find(row => row.id == id);
        if (!rowData) return;
        
        openEditModal(rowData);

    const data = {};
    
    inputs.forEach(input => {
        data[input.name] = input.value;
    });
    
    fetch(`/api/add_row/${currentTable}`, {

        headers: {

        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            closeModal();
            loadTableData();

}

        const pagination = document.getElementById('pagination');

        html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
        
        for (let i = 1; i <= totalPages; i++) {
            if (i === currentPage || (i >= currentPage - 2 && i <= currentPage + 2)) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
        }
        
        html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;

    // Пагинация для справочника
    function renderLookupPagination() {
        const pagination = document.getElementById('lookupPagination');
        let html = '';
        
        html += `<button class="page-btn" onclick="changeLookupPage(1)" ${lookupCurrentPage === 1 ? 'disabled' : ''}>«</button>`;
        html += `<button class="page-btn" onclick="changeLookupPage(${lookupCurrentPage - 1})" ${lookupCurrentPage === 1 ? 'disabled' : ''}>‹</button>`;
        
        for (let i = 1; i <= lookupTotalPages; i++) {
            if (i === lookupCurrentPage || (i >= lookupCurrentPage - 2 && i <= lookupCurrentPage + 2)) {
                html += `<button class="page-btn ${i === lookupCurrentPage ? 'active' : ''}" onclick="changeLookupPage(${i})">${i}</button>`;
            }
        }
        
        html += `<button class="page-btn" onclick="changeLookupPage(${lookupCurrentPage + 1})" ${lookupCurrentPage === lookupTotalPages ? 'disabled' : ''}>›</button>`;
        html += `<button class="page-btn" onclick="changeLookupPage(${lookupTotalPages})" ${lookupCurrentPage === lookupTotalPages ? 'disabled' : ''}>»</button>`;
        
        pagination.innerHTML = html;
    }

    function changeLookupPage(page) {
        if (page < 1 || page > lookupTotalPages) return;
        lookupCurrentPage = page;
        renderLookupTable();
    }

    // Сортировка в справочнике
    let lookupSortColumn = null;
    let lookupSortDirection = 'asc';

    function sortLookupBy(column) {
        if (lookupSortColumn === column) {
            lookupSortDirection = lookupSortDirection === 'asc' ? 'desc' : 'asc';
        } else {
            lookupSortColumn = column;
            lookupSortDirection = 'asc';
        }
        
        lookupFilteredData.sort((a, b) => {
            let aVal = a[column];
            let bVal = b[column];
            
            if (typeof aVal === 'number') {
                return lookupSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
            } else {
                aVal = String(aVal).toLowerCase();
                bVal = String(bVal).toLowerCase();
                return lookupSortDirection === 'asc' ? 
                    aVal.localeCompare(bVal) : 
                    bVal.localeCompare(aVal);
            }
        });
        
        renderLookupTable();
    }

    // Редактирование ячейки в справочнике
    function startLookupEdit(cell, column, rowId) {
        const value = cell.innerText;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = value;
        input.style.width = '100%';
        input.style.padding = '12px 15px';
        input.style.border = '2px solid var(--primary)';
        input.style.borderRadius = '8px';
        
        cell.innerHTML = '';
        cell.appendChild(input);
        cell.classList.add('editing');
        input.focus();
        
        const editingCell = { cell, column, rowId, originalValue: value };
        
        input.onblur = () => saveLookupEdit(editingCell, input.value);
        input.onkeypress = (e) => {
            if (e.key === 'Enter') saveLookupEdit(editingCell, input.value);
        };
    }

    function saveLookupEdit(editingCell, newValue) {
        const { column, rowId, originalValue } = editingCell;
        
        if (newValue !== originalValue) {
            fetch(`/api/update_cell/${currentLookupTable}/${rowId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    column: column,
                    value: newValue
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    editingCell.cell.innerHTML = newValue;
                    loadLookupTableData();
                } else {
                    alert('Ошибка сохранения');
                    editingCell.cell.innerHTML = originalValue;
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                editingCell.cell.innerHTML = originalValue;
            });
        } else {
            editingCell.cell.innerHTML = originalValue;
        }
        
        editingCell.cell.classList.remove('editing');
    }

    function saveLookupRecord() {
    const currentLookup = document.getElementById('lookupSelect').value;
    const form = document.getElementById('modalForm');
    const inputs = form.querySelectorAll('input, select');
    const data = {};
    
    inputs.forEach(input => {
        data[input.name] = input.value;
    });
    
    // Для пасхалки добавляем обязательные поля, если их нет
    if (currentLookup === 'easter_egg_settings') {
        if (!data.media_path) data.media_path = 'uploads/easter_egg.jpg';
        if (!data.media_type) data.media_type = 'image';
        if (!data.enabled) data.enabled = '1';
    }
    
    // Преобразуем числовые поля
    if (data.sort_order) data.sort_order = parseInt(data.sort_order);
    if (data.value) data.value = parseFloat(data.value);
    if (data.enabled) data.enabled = parseInt(data.enabled);
    
    fetch(`/api/add_row/${currentLookup}`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            closeModal();
            loadLookupTableData();
        } else {
            alert('Ошибка добавления: ' + (result.error || 'неизвестная ошибка'));
        }
    });
}

                <option value="1" ${rowData.enabled == 1 ? 'selected' : ''}>1</option>
                <option value="0" ${rowData.enabled == 0 ? 'selected' : ''}>0</option>
            </select>
        </div>
    `;
}
    else if (currentLookup === 'goal_types') {
        formHtml = `
            <div class="form-group">
                <label>Код (name)</label>
                <input type="text" name="name" value="${rowData.name || ''}" required>
            </div>
            <div class="form-group">
                <label>Отображаемое имя</label>
                <input type="text" name="display_name" value="${rowData.display_name || ''}" required>
            </div>
            <div class="form-group">
                <label>Иконка</label>
                <input type="text" name="icon" value="${rowData.icon || ''}">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <input type="text" name="description" value="${rowData.description || ''}">
            </div>
            <div class="form-group">
                <label>Порядок сортировки</label>
                <input type="number" name="sort_order" value="${rowData.sort_order || 1}">
            </div>
        `;
    }
    
    formHtml += `
        <div class="modal-actions">
            <button class="btn btn-success" onclick="updateLookupRecord(${rowData.id})">Сохранить</button>
            <button class="btn btn-gray" onclick="closeModal()">Отмена</button>
        </div>
    `;
    
    document.getElementById('modalForm').innerHTML = formHtml;
    document.getElementById('editModal').classList.add('active');
}

 // ========== УПРАВЛЕНИЕ УПРАЖНЕНИЯМИ ТРЕНИРОВКИ ==========


// Открыть менеджер упражнений
function manageExercises(workoutId) {
    currentWorkoutId = workoutId;
    
    // Находим название тренировки
    const workout = allData.find(w => w.id == workoutId);
    const workoutName = workout ? workout.name : `Тренировка #${workoutId}`;
    
    document.getElementById('exerciseManagerTitle').textContent = `Упражнения: ${workoutName}`;
    document.getElementById('exerciseManagerModal').classList.add('active');
    
    loadWorkoutExercises(workoutId);
    loadLibraryExercises();
}

// Закрыть менеджер упражнений
function closeExerciseManager() {
    document.getElementById('exerciseManagerModal').classList.remove('active');
    currentWorkoutId = null;
}

// Загрузить упражнения тренировки
function loadWorkoutExercises(workoutId) {
    fetch(`/api/workout_exercises/${workoutId}`)
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('workoutExercisesList');
            
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-message">В этой тренировке пока нет упражнений</div>';
                return;
            }
            
            let html = '';
            data.forEach(ex => {
                html += `
                    <div class="exercise-card">
                        <div class="exercise-info">
                            <h4>${ex.name}</h4>
                            <p>${ex.muscle_group || ''}</p>
                        </div>
                        <div class="exercise-actions">
                            <button class="btn-sm btn-danger" onclick="removeExerciseFromWorkout(${ex.workout_exercise_id})">
                                <i class="fas fa-trash"></i> Удалить
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        })
        .catch(error => console.error('Ошибка загрузки упражнений тренировки:', error));
}

// Загрузить библиотеку упражнений
function loadLibraryExercises() {
    fetch('/api/all_exercises')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('libraryExercisesList');
            
            let html = '';
            data.forEach(ex => {
                html += `
                    <div class="exercise-card">
                        <div class="exercise-info">
                            <h4>${ex.name}</h4>
                            <p>${ex.muscle_group || ''}</p>
                        </div>
                        <div class="exercise-actions">
                            <button class="btn-sm btn-success" onclick="addExerciseToWorkout(${ex.id})">
                                <i class="fas fa-plus"></i> Добавить
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        })
        .catch(error => console.error('Ошибка загрузки библиотеки:', error));
}

// Добавить упражнение в тренировку
function addExerciseToWorkout(exerciseId) {
    if (!currentWorkoutId) return;
    
    fetch(`/api/add_exercise_to_workout/${currentWorkoutId}/${exerciseId}`, {
        method: 'POST'
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            loadWorkoutExercises(currentWorkoutId);
        } else {
            alert('Ошибка при добавлении упражнения');
        }
    })
    .catch(error => console.error('Ошибка:', error));
}

// Удалить упражнение из тренировки
function removeExerciseFromWorkout(workoutExerciseId) {
    if (confirm('Удалить это упражнение из тренировки?')) {
        fetch(`/api/remove_exercise_from_workout/${workoutExerciseId}`, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                loadWorkoutExercises(currentWorkoutId);
            } else {
                alert('Ошибка при удалении упражнения');
            }
        })
        .catch(error => console.error('Ошибка:', error));
    }
}

// Поиск в библиотеке
document.getElementById('librarySearch')?.addEventListener('keyup', function() {
    const searchText = this.value.toLowerCase();
    const cards = document.querySelectorAll('#libraryExercisesList .exercise-card');
    
    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        if (text.includes(searchText)) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });
});

</script>
